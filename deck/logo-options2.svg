<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 680" fill="none">
  <rect width="1160" height="680" fill="#0F0F12"/>
  <text x="60" y="54" fill="#9A9AA8" font-family="Arial" font-size="22" font-weight="bold" letter-spacing="3">MORE MINIMALIST MARKS</text>

  <!-- D: Arrow tile (negative space) -->
  <rect x="134" y="124" width="132" height="132" rx="34" fill="#D97757"/>
  <path d="M200 234 L200 170" stroke="#0F0F12" stroke-width="16" stroke-linecap="round"/>
  <path d="M200 146 L232 188 L168 188 Z" fill="#0F0F12"/>
  <text x="200" y="312" fill="#F2F2F6" font-family="Arial" font-size="23" font-weight="bold" text-anchor="middle">D · Arrow tile</text>
  <text x="200" y="340" fill="#9A9AA8" font-family="Arial" font-size="15" text-anchor="middle">bold app-icon</text>

  <!-- E: Growth bars -->
  <rect x="520" y="216" width="24" height="40" rx="8" fill="#D97757"/>
  <rect x="556" y="191" width="24" height="65" rx="8" fill="#D97757"/>
  <rect x="592" y="159" width="24" height="97" rx="8" fill="#D97757"/>
  <path d="M604 132 L630 162 L578 162 Z" fill="#D97757"/>
  <text x="580" y="312" fill="#F2F2F6" font-family="Arial" font-size="23" font-weight="bold" text-anchor="middle">E · Growth bars</text>
  <text x="580" y="340" fill="#9A9AA8" font-family="Arial" font-size="15" text-anchor="middle">analytics → up</text>

  <!-- F: Sprout -->
  <path d="M960 256 L960 176" stroke="#D97757" stroke-width="11" stroke-linecap="round"/>
  <ellipse cx="934" cy="184" rx="26" ry="13" fill="#D97757" transform="rotate(-35 934 184)"/>
  <ellipse cx="986" cy="184" rx="26" ry="13" fill="#D97757" transform="rotate(35 986 184)"/>
  <text x="960" y="312" fill="#F2F2F6" font-family="Arial" font-size="23" font-weight="bold" text-anchor="middle">F · Sprout</text>
  <text x="960" y="340" fill="#9A9AA8" font-family="Arial" font-size="15" text-anchor="middle">organic growth</text>

  <!-- G: Pulse -->
  <path d="M150 470 H186 L200 422 L216 512 L228 470 H252" stroke="#D97757" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="200" y="566" fill="#F2F2F6" font-family="Arial" font-size="23" font-weight="bold" text-anchor="middle">G · Pulse</text>
  <text x="200" y="594" fill="#9A9AA8" font-family="Arial" font-size="15" text-anchor="middle">signal → action</text>

  <!-- H: Spark in ring -->
  <circle cx="580" cy="466" r="58" stroke="#D97757" stroke-width="9" fill="none"/>
  <path d="M580 424 L591 455 L622 466 L591 477 L580 508 L569 477 L538 466 L569 455 Z" fill="#D97757"/>
  <text x="580" y="566" fill="#F2F2F6" font-family="Arial" font-size="23" font-weight="bold" text-anchor="middle">H · Spark</text>
  <text x="580" y="594" fill="#9A9AA8" font-family="Arial" font-size="15" text-anchor="middle">insight / intelligence</text>

  <!-- I: Engine hex + arrow -->
  <path d="M960 406 L1012 436 L1012 496 L960 526 L908 496 L908 436 Z" stroke="#D97757" stroke-width="9" fill="none" stroke-linejoin="round"/>
  <path d="M960 500 L960 450" stroke="#D97757" stroke-width="9" stroke-linecap="round"/>
  <path d="M960 436 L976 460 L944 460 Z" fill="#D97757"/>
  <text x="960" y="566" fill="#F2F2F6" font-family="Arial" font-size="23" font-weight="bold" text-anchor="middle">I · Engine</text>
  <text x="960" y="594" fill="#9A9AA8" font-family="Arial" font-size="15" text-anchor="middle">the "engine" + growth</text>
</svg>
