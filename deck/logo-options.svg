<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 500" fill="none">
  <rect width="1160" height="500" fill="#0F0F12"/>
  <text x="60" y="56" fill="#9A9AA8" font-family="Arial" font-size="22" font-weight="bold" letter-spacing="3">MINIMALIST MARKS · TERRACOTTA ON DARK</text>

  <!-- A: Loop + Rise -->
  <g>
    <circle cx="200" cy="210" r="66" stroke="#D97757" stroke-width="11" fill="none"/>
    <path d="M200 246 L200 178" stroke="#D97757" stroke-width="11" stroke-linecap="round"/>
    <path d="M200 160 L218 186 L182 186 Z" fill="#D97757"/>
    <text x="200" y="350" fill="#F2F2F6" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">A · Loop + Rise</text>
    <text x="200" y="382" fill="#9A9AA8" font-family="Arial" font-size="16" text-anchor="middle">cycle contains growth</text>
  </g>

  <!-- B: Ascending chevrons -->
  <g>
    <path d="M540 170 L580 140 L620 170" stroke="#D97757" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M540 210 L580 180 L620 210" stroke="#D97757" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
    <path d="M540 250 L580 220 L620 250" stroke="#D97757" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.3"/>
    <text x="580" y="350" fill="#F2F2F6" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">B · Ascend</text>
    <text x="580" y="382" fill="#9A9AA8" font-family="Arial" font-size="16" text-anchor="middle">pure upward momentum</text>
  </g>

  <!-- C: Cycle-up arrow -->
  <g>
    <path d="M960 270 A68 68 0 1 1 1024 178" stroke="#D97757" stroke-width="11" stroke-linecap="round" fill="none"/>
    <path d="M1012 162 L1036 172 L1018 192 Z" fill="#D97757"/>
    <text x="960" y="350" fill="#F2F2F6" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">C · Cycle</text>
    <text x="960" y="382" fill="#9A9AA8" font-family="Arial" font-size="16" text-anchor="middle">autonomous, self-running</text>
  </g>

  <!-- small-size row to prove they scale -->
  <text x="60" y="448" fill="#6E6E7A" font-family="Arial" font-size="14">at 28px:</text>
  <g transform="translate(170,420) scale(0.21)">
    <circle cx="200" cy="210" r="66" stroke="#D97757" stroke-width="11" fill="none"/>
    <path d="M200 246 L200 178" stroke="#D97757" stroke-width="11" stroke-linecap="round"/>
    <path d="M200 160 L218 186 L182 186 Z" fill="#D97757"/>
  </g>
  <g transform="translate(290,418) scale(0.21)">
    <path d="M540 170 L580 140 L620 170" stroke="#D97757" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M540 210 L580 180 L620 210" stroke="#D97757" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
    <path d="M540 250 L580 220 L620 250" stroke="#D97757" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.3"/>
  </g>
  <g transform="translate(360,420) scale(0.21)">
    <path d="M960 270 A68 68 0 1 1 1024 178" stroke="#D97757" stroke-width="11" stroke-linecap="round" fill="none"/>
    <path d="M1012 162 L1036 172 L1018 192 Z" fill="#D97757"/>
  </g>
</svg>
