services:
  - type: web
    name: autonomous-growth-engine
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/run
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      # Backend agent microservice — the UI proxies /api/run + /api/connections/*
      # to this. Falls back to the default in lib/backend.js if unset.
      - key: BACKEND_URL
        value: "https://autonomous-growth-engine-backend.onrender.com"
